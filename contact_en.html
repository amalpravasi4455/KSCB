<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | koduvazhannoor Service Cooperative Bank</title>
    <meta name="description"
        content="Address, phone number, and email to contact us are available here. Call today for your queries.">
    <meta name="keywords" content="Contact Us, Location, Phone Number, Email, Inquiry">
    <meta name="author" content="koduvazhannoor Service Cooperative Bank">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Contact Us | koduvazhannoor Service Cooperative Bank">
    <meta property="og:description" content="Information to contact the society.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="page-header"
            style="background: var(--gray-dark); color: white; padding: 60px 0; text-align: center;">
            <div class="container">
                <h1>Contact Us</h1>
                <div class="breadcrumbs">
                    <a href="index_en.html">Home</a> <span class="separator"><i class="fas fa-chevron-right"></i></span>
                    <span class="current">Contact</span>
                </div>
            </div>
        </section>
        <!-- Map Section -->

        <section class="branches-section">
            <div class="container">
                <div class="contact-layout-wrapper">
                    <div class="branches-column">
                        <div class="main-branch-container">
                            <!-- Head Office Card -->
                            <div class="branch-card active"
                                data-map="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7887.002504730597!2d76.85566572032243!3d8.738816780024717!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b05c2f8b9763055%3A0xff5bcad0426a45e4!2sKoduvazhannoor%2C%20Kerala%20695601!5e0!3m2!1sen!2sin!4v1778914431333!5m2!1sen!2sin">
                                <h3><i class="fas fa-building"></i> Head Office (Koduvazhannoor)</h3>
                                <div class="info-row">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>Koduvazhannoor P.O., Pulimath</span>
                                </div>
                                <div class="info-row">
                                    <i class="fas fa-phone-alt"></i>
                                    <a href="tel:04702678201" class="phone-link">0470 - 2678201</a>
                                </div>
                            </div>
                        </div>

                        <div class="other-branches-grid">
                            <!-- Karette Branch Card -->
                            <div class="branch-card"
                                data-map="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7887.135819198716!2d76.89241534432482!3d8.732514069765603!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b05c398dbe456cf%3A0xd2e3108709f41146!2sKarette%2C%20Kerala!5e0!3m2!1sen!2sin!4v1778914627839!5m2!1sen!2sin">
                                <h3><i class="fas fa-code-branch"></i> Karette Branch</h3>
                                <div class="info-row">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>Karette, Thiruvananthapuram</span>
                                </div>
                                <div class="info-row">
                                    <i class="fas fa-phone-alt"></i>
                                    <a href="tel:04702836732" class="phone-link">0470 - 2836732</a>
                                </div>
                            </div>

                            <!-- Kattumpuram Branch Card -->
                            <div class="branch-card"
                                data-map="https://maps.google.com/maps?width=100%25&amp;height=600&amp;hl=en&amp;q=Kattumpuram,+Kallara,+Kerala+(Kattumpuram)&amp;t=&amp;z=15&amp;ie=UTF8&amp;iwloc=B&amp;output=embed">
                                <h3><i class="fas fa-code-branch"></i> Kattumpuram Branch</h3>
                                <div class="info-row">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>Kattumpuram, Thiruvananthapuram</span>
                                </div>
                                <div class="info-row">
                                    <i class="fas fa-phone-alt"></i>
                                    <a href="tel:04722860123" class="phone-link">0472 - 2860123</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Contact Form -->
                    <div class="form-column">
                        <div class="contact-form-container"
                            style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--primary-color);">
                            <h3 style="font-size: 1.8rem; margin-bottom: 25px; color: #333;">Send us a Message</h3>
                            <form id="contactForm">
                                <div style="margin-bottom: 20px;">
                                    <label for="name" style="display: block; margin-bottom: 8px; font-weight: 600;">Full
                                        Name</label>
                                    <input type="text" id="name" name="name" placeholder="Your Name" required
                                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;">
                                </div>
                                <div style="margin-bottom: 20px;">
                                    <label for="email"
                                        style="display: block; margin-bottom: 8px; font-weight: 600;">Email
                                        Address</label>
                                    <input type="email" id="email" name="email" placeholder="Your Email"
                                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;">
                                </div>
                                <div style="margin-bottom: 20px;">
                                    <label for="phone"
                                        style="display: block; margin-bottom: 8px; font-weight: 600;">Phone
                                        Number</label>
                                    <input type="tel" id="phone" name="phone" placeholder="Your Phone Number" required
                                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;">
                                </div>
                                <div style="margin-bottom: 25px;">
                                    <label for="message"
                                        style="display: block; margin-bottom: 8px; font-weight: 600;">Message</label>
                                    <textarea id="message" name="message" placeholder="How can we help?" required
                                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; height: 150px; font-family: inherit; resize: vertical;"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary" id="submitBtn"
                                    style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                                    Send Message <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dedicated Map Section -->
        <section class="map-full-section" style="height: 700px; width: 100%; position: relative; padding: 0;">
            <!-- Note: Same placeholder map embed URL is used for all branches. Please update the data-map attributes and src below with actual branch maps if available. -->
            <iframe id="branch-map"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7887.002504730597!2d76.85566572032243!3d8.738816780024717!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b05c2f8b9763055%3A0xff5bcad0426a45e4!2sKoduvazhannoor%2C%20Kerala%20695601!5e0!3m2!1sen!2sin!4v1778914431333!5m2!1sen!2sin"
                width="100%" height="100%" style="border:0;" allowfullscreen="true" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>


    </main>

    <footer id="footer-placeholder"></footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const branchCards = document.querySelectorAll('.branch-card');
            const mapIframe = document.getElementById('branch-map');

            branchCards.forEach(card => {
                card.addEventListener('click', function () {
                    // Remove active class from all cards
                    branchCards.forEach(c => c.classList.remove('active'));

                    // Add active class to clicked card
                    this.classList.add('active');

                    // Update map src
                    const mapUrl = this.getAttribute('data-map');
                    if (mapUrl) {
                        mapIframe.src = mapUrl;

                        // Scroll to map for better UX on mobile
                        if (window.innerWidth < 1024) {
                            mapIframe.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                });
            });
        });
    </script>
</body>

</html>
