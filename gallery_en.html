<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | koduvazhannor Service Cooperative Bank</title>
    <meta name="description"
        content="View pictures of our Society's various activities, events, and farmer gatherings.">
    <meta name="keywords" content="Gallery, Photos, Events, Images, Pictures">
    <meta name="author" content="koduvazhannor Service Cooperative Bank">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title"
        content="Gallery | koduvazhannor Service Cooperative Bank">
    <meta property="og:description" content="View the activities of the society through pictures.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="page-header"
            style="background: var(--gray-dark); color: white; padding: 60px 0; text-align: center;">
            <div class="container">
                <h1>Our Gallery</h1>
                <div class="breadcrumbs">
                    <a href="index_en.html">Home</a> <span class="separator"><i class="fas fa-chevron-right"></i></span> <span class="current">Gallery</span>
                </div>
            </div>
        </section>

        <section class="gallery">
            <div class="container">
                <div class="gallery-grid">

                    <!-- Main Folder 1: Images -->
                    <div class="gallery-item">
                        <a href="image-gallery_en.html">
                            <img src="images/img69.webp" alt="Images">
                            <div class="video-play-icon" style="top: 40%; font-size: 2.5rem;"><i
                                    class="fas fa-images"></i></div>
                            <span class="folder-title">Photo Gallery</span>
                        </a>
                    </div>

                    <!-- Main Folder 2: Videos -->
                    <div class="gallery-item">
                        <a href="event_en.html?id=videos">
                            <img src="images/img1.webp" alt="Videos">
                            <!-- Fallback to image if video thumbnail fails -->
                            <div class="video-play-icon" style="top: 40%; font-size: 2.5rem;"><i
                                    class="fas fa-play-circle"></i></div>
                            <span class="folder-title">Video Gallery</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer id="footer-placeholder"></footer>

    <script src="js/main.js"></script>
